[a2a]
name = "AI Foundry Quote Agent"
description = "A quoting agent that checks item availability, answers stock questions, and prepares customer-ready quotes for requested products."
version = "1.0.0"
health_message = "AI Foundry Quote Agent is running!"
default_input_modes = ["text"]
default_output_modes = ["text"]
streaming = true

[foundry]
agent_name = "quote-agent"

[smoke_tests]
prompts = [
    "Check availability for SKU-1001 and tell me if it is in stock.",
    "Prepare a quote for 25 units of SKU-1001 and 10 units of SKU-2005.",
    "I need a quote for 50 blue widgets delivered next week. Tell me what is available now and what needs backordering.",
]

[[skills]]
id = "inventory_availability"
name = "Inventory Availability"
description = "Check whether requested items are in stock, low stock, backordered, or expected on a future date."
tags = ["inventory", "availability", "stock", "sku"]
examples = [
    "Do we have SKU-1001 in stock?",
    "Check availability for 15 units of SKU-2005.",
    "Which of these items are available for immediate shipment: SKU-1001, SKU-2005, SKU-3009?",
]

[[skills]]
id = "quote_generation"
name = "Quote Generation"
description = "Create customer-ready quotes using requested items, quantities, and current availability information."
tags = ["quote", "pricing", "sales", "proposal"]
examples = [
    "Create a quote for 25 units of SKU-1001.",
    "Give me a quote for 10 laptop stands and 5 monitors.",
    "Prepare a quote for this order and call out any items that are unavailable.",
]

[[skills]]
id = "quote_clarification"
name = "Quote Clarification"
description = "Ask follow-up questions when a quote request is missing key details such as SKU, quantity, delivery timing, or substitutions."
tags = ["quote", "clarification", "sales-ops", "workflow"]
examples = [
    "I need a quote for office chairs.",
    "Can you quote this order and suggest substitutes for anything out of stock?",
    "What else do you need from me before you can prepare the quote?",
]
