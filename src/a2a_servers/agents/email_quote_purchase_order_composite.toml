[composite]
name = "AI Foundry Email Quote And Purchase Order Agent"
description = "A comprehensive Contoso workflow agent that handles customer quote requests, purchase order completion, and outbound email communication. Routes to the appropriate agent based on intent."
version = "1.0.0"
health_message = "AI Foundry Email Quote And Purchase Order Agent is running!"
default_input_modes = ["text"]
default_output_modes = ["text"]
streaming = false

[[composite.members]]
config = "quote_agent.toml"
keywords = [
    "\\bquote\\b",
    "\\bpricing\\b",
    "\\bprice (?:estimate|quote)\\b",
    "\\bestimate\\b",
    "\\bhow much\\b",
    "\\bcost(?:ing)?\\b",
    "\\bavailability\\b",
    "\\bcheck (?:stock|availability)\\b",
    "\\bsave (?:the )?quote\\b",
    "\\b(saved|existing|previous) quote\\b",
    "\\brefresh (?:the )?quote\\b",
    "\\bre-?quote\\b",
]

[[composite.members]]
config = "email_agent.toml"
keywords = [
    "\\bemail\\b",
    "\\bsend (?:an? )?email\\b",
    "\\bsend (?:a )?message\\b",
    "\\bmail\\b",
    "\\bsend to\\b",
]

[[composite.members]]
config = "purchase_order_agent.toml"
keywords = [
    "\\bpurchase order\\b",
    "\\bpo\\b",
    "\\bplace (?:a|the)? ?order\\b",
    "\\bsubmit (?:a|the)? ?order\\b",
    "\\bcomplete (?:the )?(?:purchase|order)\\b",
    "\\bfinali[sz]e (?:the )?(?:purchase|order)\\b",
    "\\bproceed with (?:the )?(?:purchase order|purchase|order)\\b",
    "\\bgo ahead with (?:the )?(?:purchase order|purchase|order)\\b",
    "\\baccept(?:ing|ed)? the quote\\b",
    "\\bbuy now\\b",
    "\\bcheckout\\b",
]
