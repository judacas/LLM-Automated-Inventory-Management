[composite]
name = "AI Foundry Quote And Purchase Order Agent"
description = "A unified Contoso customer email workflow agent that handles quote creation and saved-quote follow-up by default, and routes to purchase-order completion when the customer is ready to finalize an approved quote."
version = "1.0.0"
health_message = "AI Foundry Quote And Purchase Order Agent is running!"
default_input_modes = ["text"]
default_output_modes = ["text"]
streaming = false

[[composite.members]]
config = "quote_agent.toml"
keywords = [
    "\\bquote\\b",
    "\\bpricing\\b",
    "\\bprice (?:estimate|quote)\\b",
    "\\bestimate\\b",
    "\\bhow much\\b",
    "\\bcost(?:ing)?\\b",
    "\\bavailability\\b",
    "\\bcheck (?:stock|availability)\\b",
    "\\bsave (?:the )?quote\\b",
    "\\b(saved|existing|previous) quote\\b",
    "\\brefresh (?:the )?quote\\b",
    "\\bre-?quote\\b",
]

[[composite.members]]
config = "purchase_order_agent.toml"
keywords = [
    "\\bpurchase order\\b",
    "\\bpo\\b",
    "\\bplace (?:a|the)? ?order\\b",
    "\\bsubmit (?:a|the)? ?order\\b",
    "\\bcomplete (?:the )?(?:purchase|order)\\b",
    "\\bfinali[sz]e (?:the )?(?:purchase|order)\\b",
    "\\bproceed with (?:the )?(?:purchase order|purchase|order)\\b",
    "\\bgo ahead with (?:the )?(?:purchase order|purchase|order)\\b",
    "\\baccept(?:ing|ed)? the quote\\b",
    "\\bbuy now\\b",
    "\\bcheckout\\b",
]
