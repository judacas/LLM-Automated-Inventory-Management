# Composite agent configuration template
#
# A composite agent groups multiple individual agent configs under a single A2A endpoint.
# This lets an Azure AI Foundry client (which can only connect to one remote A2A agent at
# a time) interact with several Foundry agents through a single URL.
#
# Routing is automatic and name-based: each member is routed by message prefix
# `Route to <agent name>`. The route patterns are generated from each member's
# `[a2a].name` in its referenced `*_agent.toml`.
#
# Routing is sticky per conversation context: once a context is mapped to a member, all
# subsequent messages in that context are handled by the same backend.
#
# Save this file as  agents/<name>_composite.toml  (the *_composite.toml glob is
# auto-discovered).  Sample files should be named *_composite.sample.toml so they are
# kept in-repo but ignored at startup.

[composite]
name        = "Your Combined Agent Name"
description = "Short description of what this unified agent handles and when to call it."
version     = "1.0.0"
health_message = "Your combined agent is running!"

# Optional: override the URL slug.  Defaults to the filename stem minus "_composite".
# slug = "my-combined-agent"

default_input_modes  = ["text"]
default_output_modes = ["text"]
streaming = true

# ------------------------------------------------------------------
# Member agents
# Each [[composite.members]] block references one individual *_agent.toml file.
# Paths are resolved relative to this composite config file.
# ------------------------------------------------------------------

[[composite.members]]
# Path to the individual agent config (relative to this file).
config = "first_agent.toml"

[[composite.members]]
config = "second_agent.toml"
