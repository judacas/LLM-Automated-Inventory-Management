repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.45.0
    hooks:
      - id: markdownlint
        args: [--fix]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: local
  # switched to local to have it run with synced dependencies in the venv
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        args: [--config-file=pyproject.toml, --no-incremental, src/]
        pass_filenames: false
        # when this hook runs, mypy checks the whole src/ tree (pass_filenames=false + src/ arg);
        # pre-commit may still skip running the hook when no matching Python files are selected.
      - id: deptry
        name: deptry
        entry: uv run deptry .
        language: system
        pass_filenames: false
        always_run: true